name: GitHub Pages デプロイ

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 依存パッケージインストール
        run: pnpm install

      - name: フロントエンドビルド
        run: pnpm frontend:build
        env:
          GITHUB_PAGES: "true"

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages へのデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
